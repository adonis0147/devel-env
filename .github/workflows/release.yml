name: Release

on:
  push:
    tags:
      - '*'

jobs:
  Build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Build toolchain
        run: |
          mkdir -p output
          docker build -t toolchain toolchain
          docker run --rm --mount type=bind,source="$(pwd)/output",target=/output toolchain
          mv output/install_toolchain.sh "output/install_toolchain_${{ matrix.arch }}.sh"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-${{ matrix.arch }}
          path: output/install_toolchain_${{ matrix.arch }}.sh

  Publish:
    needs:
      - Build
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: toolchain-*
          merge-multiple: true
          path: output

      - name: Upload
        run: |
          content="$(cat .github/templates/release.md)"

          pushd output >/dev/null
          content="${content/<MD5SUM>/$(md5sum *)}"
          content="${content/<SHA256SUM>/$(sha256sum *)}"
          popd >/dev/null

          echo "${content}" >note.md

          gh release create -t "devel-env ${{ github.ref_name }}" -F note.md ${{ github.ref_name }} output/*
